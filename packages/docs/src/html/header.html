<nav class="topbar">
	<a href="/index.html" class="topbar-brand">
		<h1><!-- INSERT==brand --></h1>
	</a>

	<div class="topbar-actions">
		<button
			type="button"
			class="topbar-menu-toggle"
			id="topbar-menu-toggle"
			aria-label="Toggle menu"
			aria-expanded="false"
		>
			<svg
				width="18"
				height="18"
				viewBox="0 0 24 24"
				fill="none"
				stroke="currentColor"
				stroke-width="2"
			>
				<line x1="3" y1="6" x2="21" y2="6" />
				<line x1="3" y1="12" x2="21" y2="12" />
				<line x1="3" y1="18" x2="21" y2="18" />
			</svg>
		</button>
		<input type="text" class="topbar-search" id="topbar-search" placeholder="Search..." readonly />
	</div>
</nav>

<dialog class="search-dialog" id="search-dialog">
	<input type="text" class="search-dialog-input" id="search-dialog-input" placeholder="Search..." />
	<ul class="search-dialog-results" id="search-results"></ul>
</dialog>

<script>
	document.addEventListener("DOMContentLoaded", () => {
		const searchLinks = Array.from(document.querySelectorAll("aside nav a"))
			.filter((a) => a.getAttribute("href") !== "#" && !a.hasAttribute("aria-disabled"))
			.map((a) => ({
				label: a.textContent.trim(),
				href: a.getAttribute("href"),
				group: a.closest("nav").querySelector("h3").textContent.trim(),
			}));

		const trigger = document.getElementById("topbar-search");
		const input = document.getElementById("search-dialog-input");
		const dialog = document.getElementById("search-dialog");
		const results = document.getElementById("search-results");

		function renderResults(links) {
			results.innerHTML = links
				.map(
					(l) =>
						`<li><a href="${l.href}"><span>${l.label}</span><span class="search-result-group">${l.group}</span></a></li>`,
				)
				.join("");
		}

		function filterSearchResults(query) {
			const q = query.toLowerCase();
			renderResults(
				q
					? searchLinks.filter(
							(l) => l.label.toLowerCase().includes(q) || l.group.toLowerCase().includes(q),
						)
					: searchLinks,
			);
		}

		function openSearchDialog() {
			renderResults(searchLinks);
			dialog.showModal();
			dialog.querySelector("input").focus();
		}

		dialog.addEventListener("click", (e) => {
			if (e.target === dialog) dialog.close();
		});

		document.addEventListener("keydown", (e) => {
			if ((e.metaKey || e.ctrlKey) && e.key === "k") {
				e.preventDefault();
				openSearchDialog();
			}
			if (e.key === "Escape") dialog.close();
		});

		trigger.addEventListener("click", () => {
			openSearchDialog();
		});

		input.addEventListener("input", (e) => {
			filterSearchResults(e.target.value);
		});

		const menuToggle = document.getElementById("topbar-menu-toggle");
		const sidebar = document.querySelector("aside");

		menuToggle.addEventListener("click", () => {
			const isOpen = document.body.classList.toggle("drawer-open");
			menuToggle.setAttribute("aria-expanded", String(isOpen));
		});

		// close drawer when a nav link is tapped
		sidebar?.addEventListener("click", (e) => {
			if (e.target.closest("a") && document.body.classList.contains("drawer-open")) {
				document.body.classList.remove("drawer-open");
				menuToggle.setAttribute("aria-expanded", "false");
			}
		});

		// close on backdrop tap
		document.addEventListener("click", (e) => {
			if (
				document.body.classList.contains("drawer-open") &&
				!e.target.closest("aside") &&
				!e.target.closest("#topbar-menu-toggle")
			) {
				document.body.classList.remove("drawer-open");
				menuToggle.setAttribute("aria-expanded", "false");
			}
		});
	});
</script>
