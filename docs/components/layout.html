<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Corpus Docs</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="stylesheet" href="/styles.css" />
		<link rel="stylesheet" href="/main.css" />
		<link rel="stylesheet" href="/landing.css" />
		<link rel="stylesheet" href="/header.css" />
		<link rel="stylesheet" href="/sidebar.css" />
		<script>
			// Load highlight.js library
			const script = document.createElement("script");
			script.src =
				"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js";
			script.onload = () => {
				// Load the theme CSS
				const link = document.createElement("link");
				link.rel = "stylesheet";
				link.href =
					"https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css";
				document.head.appendChild(link);

				// Wait for DOM to be fully ready and all scripts to finish
				window.addEventListener("load", () => {
					// Highlight all code blocks
					document.querySelectorAll("pre code").forEach((block) => {
						hljs.highlightElement(block);
					});
				});
			};
			document.head.appendChild(script);
		</script>

		<script>
			document.querySelectorAll(".code-copy .copy-btn").forEach((btn) => {
				btn.addEventListener("click", async () => {
					const code = btn.previousElementSibling.textContent;
					try {
						await navigator.clipboard.writeText(code);
						btn.classList.add("copied");
						setTimeout(() => btn.classList.remove("copied"), 2000);
					} catch (err) {
						console.error("Failed to copy:", err);
					}
				});
			});
		</script>

		<style>
			nav.topbar {
				background-color: var(--color-nav-bg);
				border-bottom: 1px solid var(--color-border);
				padding: 1rem 1.5rem;
				flex-shrink: 0;
			}
			.container {
				display: flex;
				flex: 1;
				overflow: hidden;
			}
			aside {
				flex-shrink: 0;
				overflow-y: auto;
			}
			main {
				flex: 1;
				overflow-y: auto;
				padding: 2rem;
			}
			@media (max-width: 768px) {
				body {
					flex-direction: column;
				}
				.container {
					flex-direction: column;
				}
				aside {
					width: 100% !important;
					min-height: auto;
					border-right: none;
					border-bottom: 1px solid var(--color-border);
				}
				main {
					padding: 1.5rem;
				}
			}
			@media (max-width: 480px) {
				main {
					padding: 1rem;
				}
				nav.topbar {
					padding: 0.75rem 1rem;
				}
			}
		</style>
	</head>
	<body>
		<nav class="topbar"><!-- INSERT==topbar --></nav>
		<div class="container">
			<!-- INSERT==sidebar -->
			<main><!-- INSERT==content --></main>
		</div>
	</body>
</html>
